  docker:
    name: Docker Images bauen und pushen
    runs-on: ubuntu-latest
#    needs: [backend-test, frontend-test]
    #if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: QEMU einrichten
        uses: docker/setup-qemu-action@v3

      - name: Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadaten Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/minishop-backend-loibner
          tags: |
            type=raw,value=latest
            type=sha

      - name: Backend Image bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      - name: Metadaten Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/minishop-frontend-loibner
          tags: |
            type=raw,value=latest
            type=sha

      - name: Frontend Image bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}